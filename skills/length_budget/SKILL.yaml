name: length_budget
description: "章节长度预算控制 - 确保各章节长度与参考论文一致"
type: strategy
version: "1.0"

triggers:
  - pre_generation
  - length_control

dependencies: []

inputs:
  - name: article_type
    type: str
    required: true
    description: "文章类型（IEEE Trans等）"
  - name: max_pages
    type: int
    required: true
    description: "论文最大页数"
  - name: ref_chapter_lengths
    type: dict
    required: false
    description: "参考论文各章节长度"

outputs:
  - name: budget
    type: dict
    description: "各章节长度预算"

parameters:
  # IEEE Trans 14页双栏的典型长度分布
  default_budgets:
    ieee_trans_14:
      introduction:
        pages: 2.5
        chars: 12000
        percentage: 18
      related_work:
        pages: 2.0
        chars: 9600
        percentage: 14
      methodology:
        pages: 4.0
        chars: 19200
        percentage: 29
      experiments:
        pages: 3.5
        chars: 16800
        percentage: 25
      conclusion:
        pages: 1.0
        chars: 4800
        percentage: 7
      abstract_references:
        pages: 1.0
        chars: 4800
        percentage: 7
    # 高工作量论文（如R1，38页）
    high_workload_38:
      introduction:
        pages: 3.0
        chars: 13600
        percentage: 8
      related_work:
        pages: 3.0
        chars: 13000
        percentage: 8
      methodology:
        pages: 6.0
        chars: 21300
        percentage: 16
      experiments:
        pages: 8.0
        chars: 21300
        percentage: 16
      investigation_discussion:
        pages: 16.0
        chars: 51300
        percentage: 42
      conclusion:
        pages: 2.0
        chars: 5600
        percentage: 4
      appendix:
        pages: 10.0
        chars: 21000
        percentage: 6

prompt_template: ""
model_type: light
quality_check: false
max_retries: 0
