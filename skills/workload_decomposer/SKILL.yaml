name: workload_decomposer
description: "工作量分解策略 - 将大工作量论文组织为可管理的模块化子任务"
type: strategy
version: "1.0"

triggers:
  - pre_generation
  - workload_planning

dependencies:
  - length_budget
  - experiment_designer

inputs:
  - name: paper_scope
    type: str
    required: true
    description: "论文工作量级别：standard | high | extended"
  - name: innovation_points
    type: list
    required: true
  - name: total_pages
    type: int
    required: false
    default: 14

outputs:
  - name: decomposition_plan
    type: dict
    description: "工作量分解和子任务分配"

parameters:
  # 标准论文（14页 IEEE Trans）
  standard:
    total_pages: 14
    chapters:
      - name: "Introduction"
        pages: 2.5
        subtasks: 3  # 3个子节，每个约0.8页
        generation_strategy: "sequential"  # 顺序生成
      - name: "Related Work"
        pages: 2.0
        subtasks: 3  # 3个子类
        generation_strategy: "parallel"  # 可并行生成
      - name: "Methodology"
        pages: 4.0
        subtasks: 4  # 4个核心组件
        generation_strategy: "sequential"  # 需要前后衔接
      - name: "Experiments"
        pages: 3.5
        subtasks: 4  # 主实验+消融+鲁棒+SOTA
        generation_strategy: "sequential"
      - name: "Conclusion"
        pages: 1.0
        subtasks: 1
        generation_strategy: "single"

  # 高工作量论文（30+页）
  high:
    total_pages: 38
    chapters:
      - name: "Introduction"
        pages: 3.0
        subtasks: 3
        generation_strategy: "sequential"
      - name: "Related Work / Data"
        pages: 6.0
        subtasks: 5
        generation_strategy: "parallel"
      - name: "Methodology"
        pages: 6.0
        subtasks: 5
        generation_strategy: "sequential"
      - name: "Experiments"
        pages: 8.0
        subtasks: 6
        generation_strategy: "sequential"
      - name: "Investigation & Discussion"
        pages: 16.0
        subtasks: 8
        generation_strategy: "parallel"
      - name: "Conclusion"
        pages: 2.0
        subtasks: 1
        generation_strategy: "single"
    # 高工作量论文的特殊策略
    special_strategies:
      # 章节间引用前序内容
      cross_referencing: true
      # 实验数据需要从代码/日志提取
      data_driven: true
      # 调查/讨论章节需要额外数据收集
      survey_required: true
      # 附录需要独立规划
      appendix_planning: true

  # 工作量分解原则
  decomposition_principles:
    - "每个子任务应有明确的输入和预期输出"
    - "子任务之间应尽量解耦，允许并行执行"
    - "核心创新部分应获得最多篇幅预算"
    - "每个子任务应可独立验证质量"
    - "大章节（如Experiments）应按实验维度分解，而非按页码"
    - "前序章节内容应作为上下文传递给后续章节"

prompt_template: ""
model_type: reasoning
quality_check: false
max_retries: 0
