name: project_analyzer
description: "分析项目代码，提取创新点、模型架构、实验设计等关键信息"
type: analyzer
version: "2.0"

triggers:
  - phase0
  - project_analysis

dependencies: []

inputs:
  - name: project_path
    type: str
    required: true
    description: "项目代码根目录路径"
  - name: research_domain
    type: str
    required: false
    description: "研究领域（如depth estimation, object detection等）"

outputs:
  - name: innovation_points
    type: list
    description: "提取的创新点列表"
  - name: model_architecture
    type: dict
    description: "模型架构描述"
  - name: experiment_design
    type: dict
    description: "实验设计信息"

parameters: {}

prompt_template: prompt.md
model_type: reasoning
quality_check: false
max_retries: 1
