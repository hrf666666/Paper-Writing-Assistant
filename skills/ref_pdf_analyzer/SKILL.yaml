name: ref_pdf_analyzer
description: "分析参考论文PDF，提取写作风格、章节结构、引用模式等可复用信息"
type: analyzer
version: "2.0"

triggers:
  - phase0
  - ref_analysis

dependencies: []

inputs:
  - name: pdf_path
    type: str
    required: true
    description: "参考论文PDF路径"
  - name: analysis_depth
    type: str
    required: false
    default: "full"
    description: "分析深度：structure_only | full"

outputs:
  - name: style_guide
    type: dict
    description: "写作风格指导（句子结构、段落长度、语气等）"
  - name: chapter_org
    type: dict
    description: "章节组织参考（各章页数、子节数、图表数量等）"
  - name: citation_pattern
    type: dict
    description: "引用模式分析（密度、分布、引用风格等）"

parameters: {}

prompt_template: ""
model_type: light
quality_check: false
max_retries: 0
