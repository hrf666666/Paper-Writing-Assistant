name: chapter3_methodology
description: "生成第三章 Methodology - 核心创新详写，辅助模块略写"
type: generator
version: "2.0"

triggers:
  - phase3
  - methodology

dependencies:
  - length_budget
  - detail_gradient

inputs:
  - name: innovation_points
    type: list
    required: true
  - name: model_architecture
    type: dict
    required: true
  - name: experiment_design
    type: dict
    required: false
  - name: style_guide
    type: dict
    required: false
  - name: chapter_org
    type: dict
    required: false
  - name: length_budget_chars
    type: int
    required: false
    default: 19200

outputs:
  - name: content
    type: str

parameters:
  ensure_heading: "# 3. Methodology"

prompt_template: prompt.md
model_type: generation
quality_check: true
quality_threshold: 60.0
max_retries: 2
